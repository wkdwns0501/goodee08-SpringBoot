# 메세지는 한 줄에 하나씩 키=값 형식으로 정의
# 메세지 키는 점(.)을 사용해 계층적으로 만들 수 있음
# 파일명에 복수형이 사용된 것에 주의! (파일 아이콘 확인)
welcome=구디 아카데미에 오신 것을 환영합니다
welcome.description=<b>베스트 직업훈련기관</b>은 시설도 베스트입니다!

customer.name=김재현

# {}는 메세지에서 동적으로 값을 삽입할 때 사용되는 placeholder
# 숫자는 인덱스를 나타냄
#customer.contact={0} 고객님의 연락처는 {1}입니다.

# 어떤 메세지를 사용할지 컨트롤러가 결정
customer.contact.long={0} 고객님의 연락처는 {1}입니다.
customer.contact.short={0}:{1}
