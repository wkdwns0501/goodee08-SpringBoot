<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base-layout::layout(~{::section})}">
<body>
<section class="container">
    <table class="table">
        <thead>
        <tr>
            <td>#</td>
            <td>이름</td>
            <td>이메일</td>
            <td></td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${page.content}">
            <td th:text="${member.id}">id</td>
            <td th:text="${member.name}">name</td>
            <td th:text="${member.email}">name@demo.com</td>
            <td>
                <a type="button" class="btn btn-warning btn-sm" th:href="@{/member/edit/{id}(id=${member.id})}">수정</a>
                <form th:action="@{/member/delete(id=${member.id})}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${!page.isEmpty()}">
        <ul class="pagination" th:with="start=${T(java.lang.Math).floor(page.number / 5) * 5},
                last=(${start + 4 < page.totalPages ? start + 4 : page.totalPages - 1})">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{/member/list(page=${page.number - 1})}">&laquo;</a>
            </li>

            <li th:each="pageNumber: ${#numbers.sequence(start, last)}"
                class="page-item" th:classappend="${pageNumber == page.number} ? 'active'">
                <a class="page-link" th:text="${pageNumber + 1}" th:href="@{/member/list(page=${pageNumber})}">1</a>
            </li>

            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{/member/list(page=${page.number + 1})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</section>
</body>
</html>
