<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base-layout::layout(~{::section})}">
<body>
<section class="container">
    <h1>게시판</h1>
    <!-- th:object="${article}" : model에 담긴 article 객체 -->
    <form th:object="${article}" th:action="@{/article/add}" method="post">
        <div class="mb-3">
            <label class="form-label">제목</label>
            <!--
                th:field
                HTML 태그의 id, name, value 속성을 자동으로 추가
                예: <input ... id="title" name="title" value="객체 값">
            -->
            <input type="text" class="form-control" th:field="*{title}"> <!-- 초기 title값 없음 -->
            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger">
                Title Error
            </p>
        </div>

        <div class="mb-3">
            <label class="form-label">내용</label>
            <textarea class="form-control" th:field="*{description}"></textarea> <!-- 초기 description값 있음-->
            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger">
                Description Error
            </p>
        </div>

        <button type="submit" class="btn btn-primary">저장</button>
    </form>
</section>
</body>
</html>
