<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1>로그인</h1>

        <div class="mb-3 text-danger" th:if="${param.error}">
            아이디와 패스워드가 잘못 되었습니다.
        </div>
        <!-- 타임리프의 CSRF 토큰 자동 삽입 기능 -->
        <!-- 폼에 th:action 속성이 있어야 CSRF 토큰을 추가해 사이트 간 요청 위조 공격을 방지함 -->
        <form th:action="@{/login}" method="post">
            <!-- 반드시 name 속성에 username과 password가 있어야 함 -->
            <div class="col-3 mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="이메일">
            </div>
            <div class="col-3 mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="패스워드">
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
